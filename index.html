<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cronómetro Pollito</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#dff4ff, #fff2b3);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .fondo-granja {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .sol {
      position: absolute;
      top: 60px;
      right: 90px;
      width: 90px;
      height: 90px;
      background: #ffd54d;
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(255, 213, 77, 0.45);
    }

    .nube {
      position: absolute;
      background: rgba(255,255,255,0.85);
      border-radius: 30px;
      height: 28px;
    }

    .nube::before,
    .nube::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.85);
      border-radius: 50%;
    }

    .nube::before {
      width: 30px;
      height: 30px;
      top: -12px;
      left: 8px;
    }

    .nube::after {
      width: 38px;
      height: 38px;
      top: -18px;
      right: 10px;
    }

    .nube1 {
      width: 100px;
      top: 80px;
      left: 90px;
    }

    .nube2 {
      width: 120px;
      top: 140px;
      left: 250px;
    }

    .colina {
      position: absolute;
      bottom: 0;
      border-radius: 50% 50% 0 0;
    }

    .colina1 {
      left: -5%;
      width: 60%;
      height: 180px;
      background: #9edc7a;
    }

    .colina2 {
      right: -5%;
      width: 65%;
      height: 220px;
      background: #86c96a;
    }

    .granjita {
      position: absolute;
      bottom: 95px;
      left: 120px;
      width: 120px;
      height: 110px;
    }

    .casa {
      position: absolute;
      bottom: 0;
      left: 20px;
      width: 80px;
      height: 60px;
      background: #fff8dc;
      border: 3px solid #d9a441;
      border-radius: 8px;
    }

    .techo {
      position: absolute;
      bottom: 48px;
      left: 10px;
      width: 0;
      height: 0;
      border-left: 50px solid transparent;
      border-right: 50px solid transparent;
      border-bottom: 40px solid #d96b4d;
    }

    .puerta {
      position: absolute;
      bottom: 0;
      left: 50px;
      width: 20px;
      height: 32px;
      background: #c07a3a;
      border-radius: 6px 6px 0 0;
    }

    .contenedor {
      position: relative;
      z-index: 2;
      background-color: rgba(255, 248, 220, 0.95);
      border: 5px solid #f4b400;
      border-radius: 30px;
      padding: 45px 50px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 520px;         /* más ancha */
      min-height: 320px;    /* un poco más alta */
      backdrop-filter: blur(2px);
    }

    h1 {
      color: #d18b00;
      margin-bottom: 10px;
    }

    .pollito {
      font-size: 80px;
      margin: 10px 0;
      animation: saltito 1s infinite alternate;
    }

    @keyframes saltito {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-10px);
      }
    }

    #tiempo {
      font-size: 48px;
      font-weight: bold;
      color: #7a4b00;
      margin: 25px 0;
      background-color: #fff1a8;
      padding: 15px;
      border-radius: 20px;
      border: 3px dashed #f4b400;
    }

    .botones button {
      font-size: 18px;
      padding: 12px 18px;
      margin: 8px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    #play {
      background-color: #8fd14f;
      color: white;
    }

    #detener {
      background-color: #ff914d;
      color: white;
    }

    #reiniciar {
      background-color: #ff5757;
      color: white;
    }

    button:hover {
      transform: scale(1.08);
      opacity: 0.9;
    }

    .mensaje {
      color: #9a6500;
      font-size: 16px;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div class="fondo-granja">
    <div class="sol"></div>

    <div class="nube nube1"></div>
    <div class="nube nube2"></div>

    <div class="colina colina1"></div>
    <div class="colina colina2"></div>

    <div class="granjita">
      <div class="techo"></div>
      <div class="casa"></div>
      <div class="puerta"></div>
    </div>
  </div>

  <div class="contenedor">
    <h1>🐥 Cronómetro Pollito 🐥</h1>

    <div class="pollito">🐣</div>

    <div id="tiempo">00:00.00</div>

    <div class="botones">
      <button id="play">▶️ Play</button>
      <button id="detener">⏸️ Detener</button>
      <button id="reiniciar">🔄 Reiniciar</button>
    </div>

    <p class="mensaje">El pollito cuenta hasta 15 minutos 🐤</p>
  </div>

<script>
  let tiempo_acumulado = 0;  
  let tiempo_inicio = null;  
  let intervalo = null;

  const limite = 1/2 * 60 * 1000;

  const tiempo = document.getElementById("tiempo");
  const boton_play = document.getElementById("play");
  const boton_detener = document.getElementById("detener");
  const boton_reiniciar = document.getElementById("reiniciar");

  function mostrar_tiempo(ms) {
    let minutos = Math.floor(ms / 60000);
    let segundos = Math.floor((ms % 60000) / 1000);
    let milesimas = Math.floor((ms % 1000) /10);

    let minutos_texto = String(minutos).padStart(2, "0");
    let segundos_texto = String(segundos).padStart(2, "0");
    let milesimas_texto = String(milesimas).padStart(2, "0");

    tiempo.textContent = minutos_texto + ":" + segundos_texto + "." + milesimas_texto;
  }

  function actualizar_cronometro() {
    let ahora = performance.now();
    let transcurrido = tiempo_acumulado + (ahora - tiempo_inicio);

    if (transcurrido >= limite) {
      transcurrido = limite;
      mostrar_tiempo(transcurrido);
        
      clearInterval(intervalo);
      intervalo = null;
      tiempo_acumulado = limite;

      return;
    }

    mostrar_tiempo(transcurrido);
  }

  function iniciar_cronometro() {
    if (intervalo === null && tiempo_acumulado < limite) {
      tiempo_inicio = performance.now();

      intervalo = setInterval(actualizar_cronometro, 10);
    }
  }

  function detener_cronometro() {
    if (intervalo !== null) {
      tiempo_acumulado += performance.now() - tiempo_inicio;

      clearInterval(intervalo);
      intervalo = null;
    }
  }

  function reiniciar_cronometro() {
    clearInterval(intervalo);
    intervalo = null;
    tiempo_acumulado = 0;
    tiempo_inicio = null;
    mostrar_tiempo(0);
  }

  boton_play.addEventListener("click", iniciar_cronometro);
  boton_detener.addEventListener("click", detener_cronometro);
  boton_reiniciar.addEventListener("click", reiniciar_cronometro);

  mostrar_tiempo(0);
</script>

</body>
</html>
